name: Daily Tarot Reading

on:
  schedule:
    - cron: '0 22 * * *'  # 07:00 JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  daily-tarot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Daily Tarot Reading
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            CLAUDE.mdの「毎回実行するタスク」を実行してください。
            今日の日付でタロットリーディングを行い、tarot/index.htmlを更新して、
            mainブランチにマージし、claude/tarot-reading-generator-mT5l5ブランチにも反映してください。
